<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1456 816" preserveAspectRatio="xMidYMid slice">
  <style>
    .screen-segment {
      fill: rgba(234, 179, 8, 0.2);
      stroke: rgba(234, 179, 8, 0.8);
      stroke-width: 3;
      cursor: pointer;
      transition: fill 0.2s ease, stroke 0.2s ease;
    }
    .screen-segment:hover {
      fill: rgba(234, 179, 8, 0.5);
      stroke: rgba(234, 179, 8, 1);
      stroke-width: 4;
    }
    .screen-segment.selected {
      fill: rgba(234, 179, 8, 0.6);
      stroke: rgba(234, 179, 8, 1);
      stroke-width: 5;
    }
  </style>
  
  <!-- Curves SL - the teal curved screen on lower right of venue photo -->
  <!-- Always visible for testing alignment -->
  <polygon 
    id="Curves SL" 
    class="screen-segment"
    points="948,545 1000,500 1070,455 1150,415 1240,385 1330,365 1410,358 1456,360 1456,415 1410,410 1330,418 1240,438 1150,470 1070,510 1000,555 948,600"
  />
</svg>
